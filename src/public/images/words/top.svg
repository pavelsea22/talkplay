<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g stroke="#222" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top body (cone) -->
    <line x1="50" y1="12" x2="82" y2="70"/>
    <line x1="50" y1="12" x2="18" y2="70"/>
    <line x1="18" y1="70" x2="82" y2="70"/>
    <!-- Stripe lines -->
    <line x1="28" y1="46" x2="72" y2="46"/>
    <line x1="23" y1="58" x2="77" y2="58"/>
    <!-- Knob at top -->
    <circle cx="50" cy="12" r="7"/>
    <!-- Peg -->
    <line x1="50" y1="70" x2="50" y2="88"/>
    <circle cx="50" cy="90" r="3" fill="#222"/>
  </g>
</svg>
