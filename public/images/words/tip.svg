<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g stroke="#222" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Eraser (rounded top) -->
    <path d="M36,26 Q36,14 50,14 Q64,14 64,26"/>
    <!-- Eraser band -->
    <line x1="36" y1="26" x2="64" y2="26"/>
    <line x1="36" y1="32" x2="64" y2="32"/>
    <!-- Body -->
    <line x1="36" y1="32" x2="36" y2="66"/>
    <line x1="64" y1="32" x2="64" y2="66"/>
    <!-- Wood section -->
    <line x1="36" y1="66" x2="64" y2="66"/>
    <!-- Cone tip -->
    <line x1="36" y1="66" x2="50" y2="88"/>
    <line x1="64" y1="66" x2="50" y2="88"/>
    <!-- Graphite point -->
    <circle cx="50" cy="88" r="2.5" fill="#222"/>
  </g>
</svg>
