<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f4f4f4"/>

  <!-- Ears -->
  <path d="M170 170 
           C140 120, 150 60, 190 40 
           C230 20, 260 70, 240 130 
           C230 160, 210 180, 200 190 Z"
        fill="none" stroke="#4a2c22" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M342 170 
           C372 120, 362 60, 322 40 
           C282 20, 252 70, 272 130 
           C282 160, 302 180, 312 190 Z"
        fill="none" stroke="#4a2c22" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner ears -->
  <ellipse cx="205" cy="110" rx="28" ry="55" fill="#e9b4ad"/>
  <ellipse cx="307" cy="110" rx="28" ry="55" fill="#e9b4ad"/>

  <!-- Head -->
  <path d="M140 300 
           C140 230, 200 190, 256 190 
           C312 190, 372 230, 372 300 
           C372 360, 330 410, 256 410 
           C182 410, 140 360, 140 300 Z"
        fill="none" stroke="#4a2c22" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eyes -->
  <circle cx="210" cy="300" r="28" fill="#4a2c22"/>
  <circle cx="302" cy="300" r="28" fill="#4a2c22"/>

  <!-- Eye highlights -->
  <circle cx="220" cy="290" r="8" fill="#ffffff"/>
  <circle cx="312" cy="290" r="8" fill="#ffffff"/>

  <!-- Nose -->
  <ellipse cx="256" cy="330" rx="12" ry="8" fill="#e9b4ad"/>

  <!-- Mouth -->
  <path d="M256 338 
           C246 350, 230 350, 230 340"
        fill="none" stroke="#4a2c22" stroke-width="8" stroke-linecap="round"/>
  <path d="M256 338 
           C266 350, 282 350, 282 340"
        fill="none" stroke="#4a2c22" stroke-width="8" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="185" cy="330" rx="26" ry="20" fill="#e9b4ad"/>
  <ellipse cx="327" cy="330" rx="26" ry="20" fill="#e9b4ad"/>

  <!-- Cheek dots -->
  <circle cx="175" cy="330" r="4" fill="#d88f88"/>
  <circle cx="185" cy="338" r="4" fill="#d88f88"/>
  <circle cx="337" cy="330" r="4" fill="#d88f88"/>
  <circle cx="327" cy="338" r="4" fill="#d88f88"/>
</svg>